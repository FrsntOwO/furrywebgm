<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>furrywebgm | Inicio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #121214;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: #1a1a1e;
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid #ff79c6;
        }

        header h1 {
            color: #ff79c6;
            font-size: 2.5rem;
            letter-spacing: 2px;
        }

        header p {
            color: #a9a9b3;
            margin-top: 5px;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .hero {
            text-align: center;
            margin-bottom: 40px;
        }

        .hero h2 {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #8be9fd;
        }

        .game-container {
            width: 100%;
            max-width: 960px;
            background-color: #1a1a1e;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .game-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #50fa7b;
        }

        .iframe-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* Relación de aspecto 16:9 */
            height: 0;
            overflow: hidden;
            border-radius: 8px;
            background-color: #000;
        }

        .iframe-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        footer {
            background-color: #1a1a1e;
            text-align: center;
            padding: 15px;
            color: #6272a4;
            font-size: 0.9rem;
            border-top: 1px solid #333;
        }
    </style>
</head>
<body>

    <header>
        <h1>furrywebgm</h1>
        <p>Tu portal favorito de juegos en la web</p>
    </header>

    <main>
        <section class="hero">
            <h2>¡Juega a Minecraft 1.8 al instante!</h2>
            <p>No necesitas descargas. Haz clic en la pantalla del juego para empezar a jugar directamente desde tu navegador.</p>
        </section>

        <section class="game-container">
            <div class="game-header">
                <span class="game-title">Minecraft Classic (v1.8)</span>
            </div>
            <div class="iframe-wrapper">
                <iframe 
                    src="https://js.cool" 
                    allow="fullscreen; keyboard; mouse-lock" 
                    scrolling="no">
                </iframe>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 furrywebgm. Todos los derechos reservados.</p>
    </footer>

</body>
</html>
