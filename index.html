<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>furrywebgm | Inicio</title>
    <style>
        /* Paleta Drácula Optimizada */
        :root {
            --bg-body: #121214;
            --bg-panel: #1a1a1e;
            --color-pink: #ff79c6;
            --color-cyan: #8be9fd;
            --color-green: #50fa7b;
            --color-comment: #a9a9b3; /* Mejorado contraste para accesibilidad */
            --color-text: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--color-text);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: var(--bg-panel);
            padding: 25px 20px;
            text-align: center;
            border-bottom: 3px solid var(--color-pink);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        header h1 {
            color: var(--color-pink);
            font-size: 2.8rem;
            letter-spacing: 3px;
            text-transform: lowercase;
            text-shadow: 0 0 15px rgba(255, 121, 198, 0.3);
        }

        header p {
            color: #a9a9b3;
            margin-top: 8px;
            font-size: 1rem;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
            max-width: 1100px;
            margin: 0 auto;
            width: 100%;
            gap: 25px;
        }

        .hero {
            text-align: center;
            max-width: 700px;
        }

        .hero h2 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            color: var(--color-cyan);
        }

        .hero p {
            color: #a9a9b3;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        /* Selector de Juegos (Pestañas) */
        .tabs-container {
            display: flex;
            gap: 12px;
            width: 100%;
            max-width: 960px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .tabs-container::-webkit-scrollbar {
            height: 4px;
        }
        .tabs-container::-webkit-scrollbar-thumb {
            background: var(--color-pink);
            border-radius: 4px;
        }

        .tab-btn {
            background-color: var(--bg-panel);
            color: var(--color-comment);
            border: 1px solid #333;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.2s ease;
            white-space: nowrap;
            flex: 1;
            text-align: center;
        }

        .tab-btn:hover {
            border-color: var(--color-pink);
            color: var(--color-text);
        }

        .tab-btn.active {
            background-color: var(--color-pink);
            color: #000000;
            border-color: var(--color-pink);
            box-shadow: 0 0 15px rgba(255, 121, 198, 0.4);
        }

        /* Contenedor Único de Juego */
        .game-viewport {
            width: 100%;
            max-width: 960px;
            background-color: var(--bg-panel);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.6);
            border: 1px solid #2d2d34;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .game-title {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--color-green);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .game-title::before {
            content: "●";
            color: var(--color-green);
            animation: pulse 1.5s infinite;
        }

        .btn-fullscreen {
            background-color: #2d2d34;
            color: var(--color-text);
            border: 1px solid #444;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: background-color 0.2s;
        }

        .btn-fullscreen:hover {
            background-color: #3e3e4a;
            border-color: var(--color-cyan);
        }

        .iframe-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* Relación de aspecto 16:9 */
            height: 0;
            overflow: hidden;
            border-radius: 8px;
            background-color: #000;
            border: 1px solid #121214;
        }

        .iframe-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Pantalla de activación manual */
        .click-to-play {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #151518;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .click-to-play:hover {
            background-color: #1c1c22;
        }

        .btn-start-game {
            background-color: var(--color-green);
            color: #000;
            border: none;
            padding: 15px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 20px rgba(80, 250, 123, 0.4);
            cursor: pointer;
        }

        footer {
            background-color: var(--bg-panel);
            text-align: center;
            padding: 20px;
            color: #6272a4;
            font-size: 0.9rem;
            border-top: 1px solid #2d2d34;
            margin-top: auto;
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        @media (max-width: 650px) {
            header h1 { font-size: 2rem; }
            .tabs-container { flex-direction: column; gap: 8px; }
            .tab-btn { flex: none; width: 100%; }
            .game-viewport { padding: 10px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>furrywebgm</h1>
        <p>Tu portal favorito de juegos en la web</p>
    </header>

    <main>
        <section class="hero">
            <h2>¡Tu Zona de Juegos IO & Web!</h2>
            <p>Selecciona un título abajo. Haz clic en "Iniciar Juego" para activar únicamente ese juego y ahorrar recursos del sistema.</p>
        </section>

        <!-- Pestañas para elegir juego -->
        <nav class="tabs-container" aria-label="Selección de juegos">
            <button class="tab-btn active" onclick="seleccionarPestaña('https://eaglercraft.com', 'EaglercraftX (Minecraft 1.8.8)', this)">⛏️ Eaglercraft 1.8.8</button>
            <button class="tab-btn" onclick="seleccionarPestaña('https://polytrackgame.io', 'PolyTrack 3D', this)">🏎️ PolyTrack</button>
            <button class="tab-btn" onclick="seleccionarPestaña('https://frontwars.org', 'frontswars.io (v1.8)', this)">🎮 Front Wars</button>
            <button class="tab-btn" onclick="seleccionarPestaña('https://territorial.io', 'territorial.io', this)">🗺️ Territorial.io</button>
        </nav>

        <!-- Área de juego única -->
        <section class="game-viewport" id="game-section">
            <div class="game-header">
                <span id="current-title" class="game-title">EaglercraftX (Minecraft 1.8.8)</span>
                <button class="btn-fullscreen" onclick="toggleFullscreen()">Pantalla Completa</button>
            </div>

            <div class="iframe-wrapper">
                <!-- Pantalla de inicio manual -->
                <div id="click-to-play" class="click-to-play" onclick="iniciarJuego()">
                    <button class="btn-start-game">Iniciar Juego</button>
                </div>
                <!-- Iframe vacío inicialmente para optimizar -->
                <iframe id="game-iframe" src="" title="Contenedor de juego"></iframe>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 furrywebgm. Todos los derechos reservados.</p>
    </footer>

    <script>
        // Variables globales para guardar el estado del juego seleccionado
        let urlActual = 'https://eaglercraft.com';
        let tituloActual = 'EaglercraftX (Minecraft 1.8.8)';

        function seleccionarPestaña(url, titulo, boton) {
            // Guardar datos actuales
            urlActual = url;
            tituloActual = titulo;

            // Actualizar interfaz del título
            document.getElementById('current-title').textContent = titulo;

            // Quitar clase activa a todos los botones y ponérsela al seleccionado
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            boton.classList.add('active');

            // Resetear el iframe (ocultar juego y mostrar pantalla de "Iniciar Juego")
            const iframe = document.getElementById('game-iframe');
            iframe.src = ""; 
            document.getElementById('click-to-play').style.display = 'flex';
        }

        function iniciarJuego() {
